<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1000" viewBox="0 0 1200 1000"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/></marker></defs><rect width="100%" height="100%" fill="#020617"/><text x="600" y="55" font-family="Segoe UI, Arial" font-size="28" font-weight="700" fill="#f8fafc" text-anchor="middle">Advanced Dynamic Orchestration Lv.3</text><rect x="410" y="100" width="380" height="58" rx="14" fill="#111827" stroke="#22d3ee" stroke-width="2"/><text x="600" y="134" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#22d3ee" text-anchor="middle">User Query</text><text x="600" y="162" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">task request enters runtime planner</text><rect x="410" y="186" width="380" height="58" rx="14" fill="#111827" stroke="#34d399" stroke-width="2"/><text x="600" y="220" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#34d399" text-anchor="middle">Intent Analyzer</text><text x="600" y="248" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">detect QA / case / prediction intent</text><line x1="600" y1="158" x2="600" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="272" width="380" height="58" rx="14" fill="#111827" stroke="#a78bfa" stroke-width="2"/><text x="600" y="306" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#a78bfa" text-anchor="middle">Complexity Estimator</text><text x="600" y="334" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">score evidence, case, mask, model needs</text><line x1="600" y1="244" x2="600" y2="272" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="358" width="380" height="58" rx="14" fill="#111827" stroke="#fbbf24" stroke-width="2"/><text x="600" y="392" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">Agent Registry</text><text x="600" y="420" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">select agents by capability and fallback</text><line x1="600" y1="330" x2="600" y2="358" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="444" width="380" height="58" rx="14" fill="#111827" stroke="#22d3ee" stroke-width="2"/><text x="600" y="478" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#22d3ee" text-anchor="middle">Dynamic Planner</text><text x="600" y="506" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">generate runtime workflow nodes</text><line x1="600" y1="416" x2="600" y2="444" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="530" width="380" height="58" rx="14" fill="#111827" stroke="#34d399" stroke-width="2"/><text x="600" y="564" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#34d399" text-anchor="middle">Generated Workflow</text><text x="600" y="592" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">not selected from workflows.json</text><line x1="600" y1="502" x2="600" y2="530" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="616" width="380" height="58" rx="14" fill="#111827" stroke="#a78bfa" stroke-width="2"/><text x="600" y="650" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#a78bfa" text-anchor="middle">Execution</text><text x="600" y="678" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">sequential / parallel / conditional</text><line x1="600" y1="588" x2="600" y2="616" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="702" width="380" height="58" rx="14" fill="#111827" stroke="#fbbf24" stroke-width="2"/><text x="600" y="736" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">Quality Gate</text><text x="600" y="764" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">inspect intermediate result quality</text><line x1="600" y1="674" x2="600" y2="702" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="788" width="380" height="58" rx="14" fill="#111827" stroke="#fb7185" stroke-width="2"/><text x="600" y="822" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#fb7185" text-anchor="middle">Retry / Add Agent / Fallback</text><text x="600" y="850" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">runtime adjustment on failure</text><line x1="600" y1="760" x2="600" y2="788" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="874" width="380" height="58" rx="14" fill="#111827" stroke="#22d3ee" stroke-width="2"/><text x="600" y="908" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#22d3ee" text-anchor="middle">Decision Trace</text><text x="600" y="936" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">record observation, reason, action, output</text><line x1="600" y1="846" x2="600" y2="874" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/></svg>