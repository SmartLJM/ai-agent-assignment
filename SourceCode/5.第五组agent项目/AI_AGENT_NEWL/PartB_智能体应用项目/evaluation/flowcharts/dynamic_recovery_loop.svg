<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="742" viewBox="0 0 1200 742"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/></marker></defs><rect width="100%" height="100%" fill="#020617"/><text x="600" y="55" font-family="Segoe UI, Arial" font-size="28" font-weight="700" fill="#f8fafc" text-anchor="middle">Dynamic Recovery and Retry Loop</text><rect x="410" y="100" width="380" height="58" rx="14" fill="#111827" stroke="#22d3ee" stroke-width="2"/><text x="600" y="134" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#22d3ee" text-anchor="middle">Agent Execution</text><text x="600" y="162" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">run generated node</text><rect x="410" y="186" width="380" height="58" rx="14" fill="#111827" stroke="#fbbf24" stroke-width="2"/><text x="600" y="220" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">Error or Low Quality?</text><text x="600" y="248" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">quality gate or exception check</text><line x1="600" y1="158" x2="600" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="272" width="380" height="58" rx="14" fill="#111827" stroke="#fb7185" stroke-width="2"/><text x="600" y="306" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#fb7185" text-anchor="middle">Recovery Manager</text><text x="600" y="334" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">choose retry / rewrite / fallback</text><line x1="600" y1="244" x2="600" y2="272" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="358" width="380" height="58" rx="14" fill="#111827" stroke="#a78bfa" stroke-width="2"/><text x="600" y="392" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#a78bfa" text-anchor="middle">Add Runtime Node</text><text x="600" y="420" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">insert recovery node into workflow</text><line x1="600" y1="330" x2="600" y2="358" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="444" width="380" height="58" rx="14" fill="#111827" stroke="#34d399" stroke-width="2"/><text x="600" y="478" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#34d399" text-anchor="middle">Re-execute</text><text x="600" y="506" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">run rewritten query or fallback agent</text><line x1="600" y1="416" x2="600" y2="444" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="530" width="380" height="58" rx="14" fill="#111827" stroke="#fbbf24" stroke-width="2"/><text x="600" y="564" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">Quality Gate</text><text x="600" y="592" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">validate recovered output</text><line x1="600" y1="502" x2="600" y2="530" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="616" width="380" height="58" rx="14" fill="#111827" stroke="#22d3ee" stroke-width="2"/><text x="600" y="650" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#22d3ee" text-anchor="middle">Report + Trace</text><text x="600" y="678" font-family="Segoe UI, Arial" font-size="14" font-weight="400" fill="#cbd5e1" text-anchor="middle">final answer with decision log</text><line x1="600" y1="588" x2="600" y2="616" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/></svg>